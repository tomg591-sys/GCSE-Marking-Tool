// ── MARK SCHEMES ───────────────────────────────────────────────────────────
function getMarkScheme(qId) {
  const s = {
    q1:`Q1 (2 marks): 1 mark per relevant word/phrase quoted directly from specified lines. No explanation needed. Max 2 marks. Common errors: paraphrasing instead of quoting; quoting from wrong lines.`,
    q2:`Q2 (4 marks): 1 mark per distinct, clearly explained point about thoughts/feelings IN OWN WORDS. No marks for bare quotation. Reward inference — reading between the lines. 4 separate, precisely explained points needed.`,
    q3:`Q3 (5 marks): 1 mark per Point + brief Quote + Explanatory inference (PQE × 5). Reward range of comprehension. All evidence from specified line range only.`,
    q4:`Q4 (12 marks):
Band 4 (10–12): Perceptive detailed analysis. Sophisticated terminology. Convincing interpretation. Multiple well-chosen quotes analysed at word level. Structural AND language points across whole text.
Band 3 (7–9): Clear explanation of effects. Relevant terminology. Supported with quotes. Some analysis of individual words.
Band 2 (4–6): Some awareness. Quotes included but analysis surface-level. Limited terminology.
Band 1 (1–3): Simple comments. Little analysis. Minimal terminology.
Must cover beginning, middle AND end of text. Must include structural point.`,
    q5:`Q5 (22 marks):
Band 4 (18–22): Perceptive detailed comparison of BOTH writers' perspectives/attitudes throughout. Sophisticated analysis of language/structure. Wide range of comparative points.
Band 3 (13–17): Clear explained comparisons. Both texts engaged with throughout. Relevant techniques discussed. Consistently comparative structure.
Band 2 (7–12): Some comparison. Both texts mentioned but may be imbalanced. Language features noted.
Band 1 (1–6): Simple observations. May describe rather than compare. May focus on one text only.
Focus must be on what WRITERS THINK AND FEEL — not just what happens. Compare both texts throughout every paragraph.`,
  };
  return s[qId] || "";
}

const SAFEGUARDING_KEYWORDS = ["self-harm","self harm","hurt myself","kill myself","suicide","being abused","abuse","rape","sexual","drugs","alcohol","weapon","bomb","extremist","grooming","exploit","running away","nobody cares","want to die","no point living"];

function checkSafeguarding(text) {
  const lower = text.toLowerCase();
  return SAFEGUARDING_KEYWORDS.some(kw => lower.includes(kw));
}

// ── AI MARKING ENGINE ──────────────────────────────────────────────────────
async function markAnswer({ qId, answer, paperLabel, anthologyId, images = [] }) {
  const q        = QUESTIONS.find(x => x.id === qId);
  const notes    = NOTES[anthologyId] || {};
  const anthTitle = ANTHOLOGY_TEXTS.find(t => t.id === anthologyId)?.title || "Not specified";
  const hasImages = images.length > 0;

  const promptText = `You are an expert Edexcel iGCSE English Language examiner (Spec A, Paper 1: 4EA1/01).
Mark this student answer accurately and encouragingly. The student is aged 13–16.

QUESTION: ${q.label} (${q.marks} marks) — ${q.desc}
PAPER: ${paperLabel || "General practice"}
ANTHOLOGY TEXT: ${anthTitle}

YOUR REFERENCE NOTES ON THIS TEXT:
Background: ${notes.background || ""}
Key structure points: ${(notes.structure || []).join("; ")}
Key language points: ${(notes.language || []).join("; ")}

MARK SCHEME:
${getMarkScheme(qId)}

STUDENT ANSWER:
${hasImages
  ? `The student has submitted a handwritten answer as ${images.length} image(s) (provided above, in page order). Please read all pages carefully before marking.${answer.trim() ? `\n\nAdditional typed notes: ${answer.trim()}` : ""}`
  : `"""\n${answer}\n"""`
}

Respond ONLY with valid JSON (no markdown fences, no preamble):
{
  "mark": <integer 0–${q.marks}>,
  "outOf": ${q.marks},
  "grade": "<Excellent|Good|Developing|Beginning>",
  "summary": "<1-2 sentence overview of answer quality, warm and specific>",
  "strengths": ["<specific strength with example from answer>", "<second strength>"],
  "improvements": ["<specific actionable improvement>", "<second improvement>"],
  "examinerTip": "<one concise exam technique tip directly relevant to this answer>",
  "safeguardingFlag": <true if content contains anything concerning for a 13-16yr old, false otherwise>,
  "safeguardingNote": "<brief note if flagged, empty string otherwise>"
}`;

  try {
    const parts = [];
    images.forEach((img, i) => {
      parts.push({ text: `Page ${i+1} of student's handwritten answer:` });
      parts.push({ inline_data: { mime_type: img.mediaType, data: img.data } });
    });
    parts.push({ text: promptText });

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${CONFIG.GEMINI_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: { temperature: 0.2, maxOutputTokens: 1000 },
        }),
      }
    );
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    if (text) {
      return { result: JSON.parse(text.replace(/```json|```/g, "").trim()), model: "Gemini" };
    }
    console.error("Gemini returned no text:", data);
  } catch(e) {
    console.error("Gemini call failed:", e);
  }

  return {
    model: "Error",
    result: {
      mark: 0, outOf: q.marks,
      grade: "Error",
      summary: "⚠️ Marking failed — please try again. If the problem persists, contact your teacher.",
      strengths: [],
      improvements: [],
      examinerTip: "",
      safeguardingFlag: false, safeguardingNote: "",
    },
  };
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async e => {
    e.preventDefault();
    setLoading(true); setErr("");
    await new Promise(r => setTimeout(r, 350));
    const u = USERS[email];
    if (u && u.password === pw) onLogin({ email, ...u });
    else setErr("Incorrect email or password.");
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", padding:"2rem" }}>
      <div style={{ width:"100%", maxWidth:420 }} className="fade-in">

          <div style={{ fontSize:"2.8rem", marginBottom:"0.5rem" }}>📚</div>
          <h1 style={{ fontFamily:"var(--font-display)", fontSize:"1.9rem", color:"var(--accent)", letterSpacing:"-0.02em" }}>English Language</h1>
          <p style={{ color:"var(--text-muted)", marginTop:"0.25rem" }}>Edexcel iGCSE Revision & Marking Tool</p>
          <p style={{ color:"var(--text-muted)", fontSize:"0.78rem", marginTop:"0.2rem", fontStyle:"italic" }}>Dulwich College</p>
        </div>
        <form onSubmit={submit} style={{ ...S.card }}>
          <div style={{ marginBottom:"1.1rem" }}>
            <label style={S.label}>Email address</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="name@school.ac.uk" required style={S.input} />
          </div>
          <div style={{ marginBottom:"1.4rem" }}>
            <label style={S.label}>Password</label>
            <input value={pw} onChange={e=>setPw(e.target.value)} type="password" placeholder="••••••••" required style={S.input} />
          </div>
          {err && <div style={{ background:"#fee2e2", color:"#991b1b", padding:"0.7rem 1rem", borderRadius:8, marginBottom:"1rem", fontSize:"0.875rem" }}>{err}</div>}
          <button type="submit" disabled={loading} style={S.primaryBtn}>{loading ? "Signing in…" : "Sign in →"}</button>
        </form>
        <p style={{ textAlign:"center", marginTop:"1.25rem", fontSize:"0.8rem", color:"var(--text-muted)" }}>
          Don't have an account? Ask your teacher to create one.

        <div style={{ textAlign:"center", marginTop:"0.75rem", fontSize:"0.73rem", color:"var(--text-muted)", background:"var(--card)", border:"1px dashed var(--border)", borderRadius:8, padding:"0.6rem 1rem" }}>
          <strong>Demo credentials:</strong><br/>
          Student: student@test.com / student123 &nbsp;|&nbsp; Teacher: teacher@test.com / teacher123
        </div>
      </div>
    </div>
  );
}

// ── PRACTICE PAGE ──────────────────────────────────────────────────────────
function PracticePage({ user }) {
  const [step, setStep] = useState("q");   // q → paper → write → marking → result
  const [qId, setQId] = useState(null);
  const [paperId, setPaperId] = useState(null);
  const [answer, setAnswer] = useState("");
  // pages: array of { dataUrl, data (base64), mediaType, label }
  const [pages, setPages] = useState([]);
  const [result, setResult] = useState(null);
  const fileRef = useRef();

  const q     = QUESTIONS.find(x => x.id === qId);
  const paper = PAST_PAPERS.find(x => x.id === paperId);

  const addPages = e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    files.forEach(f => {
      const r = new FileReader();
      r.onload = ev => {
        const dataUrl = ev.target.result;
        const data = dataUrl.split(",")[1];
        const mediaType = f.type || "image/jpeg";
        setPages(prev => [...prev, { dataUrl, data, mediaType }]);
      };
      r.readAsDataURL(f);
    });
    // reset input so same file can be re-added if needed
    e.target.value = "";
  };

  const removePage = idx => setPages(prev => prev.filter((_, i) => i !== idx));
  const movePage   = (idx, dir) => {
    setPages(prev => {
      const arr = [...prev];
      const swap = idx + dir;
      if (swap < 0 || swap >= arr.length) return arr;
      [arr[idx], arr[swap]] = [arr[swap], arr[idx]];
      return arr;
    });
  };

  const submit = async () => {
    const hasText   = answer.trim().length > 0;
    const hasImages = pages.length > 0;
    if (!hasText && !hasImages) return;

    const textForSafeguard = answer.trim();
    if (textForSafeguard && checkSafeguarding(textForSafeguard))
      DB.addFlag({ userId:user.id, userName:user.name, qId, paperId, content:textForSafeguard, reason:"Keyword match" });

    setStep("marking");
    const anthologyId = paper?.anthology || "adichie";
    const paperLabel  = paper?.label || "General practice";

    const { result: res, model } = await markAnswer({
      qId, answer: answer.trim(), paperLabel, anthologyId,
      images: pages.map(p => ({ data: p.data, mediaType: p.mediaType })),
    });

    if (res.safeguardingFlag)
      DB.addFlag({ userId:user.id, userName:user.name, qId, paperId, content:answer.trim()||"[image]", reason: res.safeguardingNote || "AI flag" });

    DB.addSubmission({ userId:user.id, userName:user.name, qId, paperId,
      answer: answer.trim() || `[${pages.length}-page handwritten answer]`, result:res, model });
    setResult({ ...res, model });
    setStep("result");
  };

  const reset = () => { setAnswer(""); setPages([]); setResult(null); };

  // ── Step: choose question
  if (step === "q") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <h2 style={S.pageH}>Practice & Marking</h2>
      <p style={{ color:"var(--text-muted)", marginBottom:"1.5rem" }}>Which question would you like to practise?</p>
      {QUESTIONS.map(q => (
        <button key={q.id} onClick={()=>{ setQId(q.id); setStep("paper"); }} style={S.qCard}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"0.5rem" }}>
            <div>
              <span style={{ fontWeight:700, fontSize:"1rem", color:"var(--accent)" }}>{q.label}</span>
              <span style={{ marginLeft:"0.75rem", color:"var(--text-secondary)", fontSize:"0.88rem" }}>{q.desc}</span>
            </div>
            <div style={{ display:"flex", gap:"0.4rem" }}>
              <span style={{ background:"var(--accent-light)", color:"var(--accent)", borderRadius:20, padding:"0.2rem 0.65rem", fontSize:"0.75rem", fontWeight:700 }}>{q.marks}m</span>
              <span style={{ background:"var(--bg)", border:"1px solid var(--border)", color:"var(--text-muted)", borderRadius:20, padding:"0.2rem 0.65rem", fontSize:"0.75rem" }}>{q.timing}</span>
            </div>
          </div>
          <div style={{ marginTop:"0.3rem", fontSize:"0.77rem", color:"var(--text-muted)" }}>📄 {q.section}</div>
        </button>
      ))}
    </div>
  );

  // ── Step: choose paper
  if (step === "paper") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <button onClick={()=>setStep("q")} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--accent)", fontSize:"0.875rem", padding:"0 0 1rem" }}>← Back</button>
      <h2 style={S.pageH}>{q?.label}: {q?.desc}</h2>
      <p style={{ color:"var(--text-muted)", marginBottom:"1.5rem" }}>Which past paper are you working from?</p>
      {PAST_PAPERS.map(p => {
        const ant = ANTHOLOGY_TEXTS.find(t => t.id === p.anthology);
        return (
          <button key={p.id} onClick={()=>{ setPaperId(p.id); setStep("write"); }} style={S.qCard}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{ fontWeight:700, color:"var(--text)" }}>{p.label}</div>
            <div style={{ fontSize:"0.8rem", color:"var(--text-muted)", marginTop:2 }}>Anthology: <span style={{ color:"var(--accent)" }}>{ant?.title}</span></div>
            <div style={{ marginTop:"0.6rem", display:"flex", gap:"0.75rem" }}>
              <a href={p.queUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                style={{ fontSize:"0.77rem", color:"var(--accent)", textDecoration:"none" }}>📄 Question paper ↗</a>
              <a href={p.srcUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                style={{ fontSize:"0.77rem", color:"var(--accent)", textDecoration:"none" }}>📑 Source booklet ↗</a>
            </div>
          </button>
        );
      })}
      <button onClick={()=>{ setPaperId(null); setStep("write"); }} style={{ ...S.qCard, opacity:0.7 }}>
        <div style={{ fontWeight:600, color:"var(--text)" }}>General practice (no specific paper)</div>
        <div style={{ fontSize:"0.8rem", color:"var(--text-muted)", marginTop:2 }}>I'll mark on general Edexcel criteria</div>
      </button>
    </div>
  );

  // ── Step: write answer
  if (step === "write") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <button onClick={()=>setStep("paper")} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--accent)", fontSize:"0.875rem", padding:"0 0 1rem" }}>← Back</button>
      <div style={S.card}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"1rem", flexWrap:"wrap", gap:"0.5rem" }}>
          <div>
            <h2 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:"1.3rem", color:"var(--accent)" }}>{q?.label}</h2>
            <p style={{ margin:"0.25rem 0 0", color:"var(--text-muted)", fontSize:"0.85rem" }}>{q?.desc} · {q?.marks} marks · {q?.timing}</p>
          </div>
          {paper && (
            <div style={{ display:"flex", gap:"0.5rem" }}>
              <a href={paper.srcUrl} target="_blank" rel="noreferrer" style={{ background:"var(--accent-light)", color:"var(--accent)", padding:"0.3rem 0.65rem", borderRadius:6, fontSize:"0.77rem", textDecoration:"none" }}>Source ↗</a>
              <a href={paper.queUrl} target="_blank" rel="noreferrer" style={{ background:"var(--accent-light)", color:"var(--accent)", padding:"0.3rem 0.65rem", borderRadius:6, fontSize:"0.77rem", textDecoration:"none" }}>Paper ↗</a>
            </div>
          )}
        </div>

        <div style={{ background:"var(--bg)", borderRadius:10, padding:"0.9rem 1rem", marginBottom:"1.1rem", fontSize:"0.86rem", color:"var(--text-secondary)", lineHeight:1.6 }}>
          <strong style={{ color:"var(--text)" }}>How to answer: </strong>
          {{ q1:"Select two words or phrases from the specified lines. Quote directly — no paraphrase, no explanation needed.",
             q2:"Write four separate points in your own words. Show inference — read between the lines. Do not use quotation. Aim for 100–200 words.",
             q3:"Make five points, each with a brief quotation and an explanatory comment. Use Point → Quote → Explanation five times. Aim for 150–250 words.",
             q4:"Write three analytical paragraphs covering beginning, middle and end of the anthology text. Use precise terminology. Zoom in on individual words. Aim for ~400 words.",
             q5:"Write six comparative paragraphs, each comparing both writers' perspectives on a specific point. Focus on what the writers think and feel, not just what happens. Aim for ~750 words.",
          }[qId]}
        </div>

        <textarea value={answer} onChange={e=>setAnswer(e.target.value)}
          placeholder="Type your answer here…"
          style={{ width:"100%", minHeight: qId==="q5"?420:qId==="q4"?300:160, padding:"1rem", border:"2px solid var(--border)", borderRadius:10, fontSize:"0.9rem", fontFamily:"var(--font-body)", resize:"vertical", color:"var(--text)", background:"var(--bg)", boxSizing:"border-box", lineHeight:1.65, outline:"none" }} />

        {/* ── Multi-page image uploader ─────────────────────────────── */}
        <div style={{ marginTop:"1rem", background:"var(--bg)", borderRadius:10, padding:"1rem", border:"1px solid var(--border)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: pages.length ? "0.85rem" : 0 }}>
            <span style={{ fontSize:"0.85rem", fontWeight:600, color:"var(--text)" }}>
              📷 Handwritten answer {pages.length > 0 ? `(${pages.length} page${pages.length>1?"s":""} uploaded)` : ""}
            </span>
            <div style={{ display:"flex", gap:"0.5rem" }}>
              <input type="file" accept="image/*" multiple ref={fileRef} onChange={addPages} style={{ display:"none" }} />
              <button onClick={()=>fileRef.current.click()} style={{ ...S.secondaryBtn, fontSize:"0.8rem", padding:"0.35rem 0.75rem" }}>
                + Add page{pages.length>0?"s":""}
              </button>
            </div>
          </div>

          {pages.length === 0 && (
            <p style={{ fontSize:"0.8rem", color:"var(--text-muted)", marginTop:"0.5rem", lineHeight:1.5 }}>
              Take a photo of each page and upload them here. You can add multiple pages and reorder them.
            </p>
          )}

          {pages.length > 0 && (
            <div style={{ display:"flex", gap:"0.75rem", flexWrap:"wrap" }}>
              {pages.map((pg, i) => (
                <div key={i} style={{ position:"relative", textAlign:"center" }}>
                  <div style={{ fontSize:"0.72rem", fontWeight:700, color:"var(--accent)", marginBottom:"0.3rem" }}>Page {i+1}</div>
                  <img src={pg.dataUrl} alt={`Page ${i+1}`}
                    style={{ width:90, height:120, objectFit:"cover", borderRadius:6, border:"2px solid var(--border)", display:"block" }} />
                  {/* Reorder & delete controls */}
                  <div style={{ display:"flex", justifyContent:"center", gap:"0.2rem", marginTop:"0.35rem" }}>
                    <button onClick={()=>movePage(i,-1)} disabled={i===0}
                      style={{ background:"none", border:"1px solid var(--border)", borderRadius:4, padding:"0.1rem 0.35rem", cursor:"pointer", fontSize:"0.7rem", color:"var(--text-muted)", opacity:i===0?0.3:1 }}>◀</button>
                    <button onClick={()=>removePage(i)}
                      style={{ background:"none", border:"1px solid #fecdd3", borderRadius:4, padding:"0.1rem 0.35rem", cursor:"pointer", fontSize:"0.7rem", color:"#be123c" }}>✕</button>
                    <button onClick={()=>movePage(i,1)} disabled={i===pages.length-1}
                      style={{ background:"none", border:"1px solid var(--border)", borderRadius:4, padding:"0.1rem 0.35rem", cursor:"pointer", fontSize:"0.7rem", color:"var(--text-muted)", opacity:i===pages.length-1?0.3:1 }}>▶</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{ marginTop:"1.25rem", display:"flex", justifyContent:"flex-end" }}>
          <button onClick={submit} disabled={!answer.trim()&&pages.length===0}
            style={{ ...S.primaryBtn, width:"auto", opacity:(!answer.trim()&&pages.length===0)?0.4:1 }}>
            Submit for marking →
          </button>
        </div>
      </div>

      <div style={{ marginTop:"1rem", background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10, padding:"0.85rem 1rem", fontSize:"0.8rem", color:"#92400e", lineHeight:1.55 }}>
        ⚠️ {SAFEGUARDING_NOTICE}
      </div>
    </div>
  );

  // ── Step: marking spinner
  if (step === "marking") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"5rem 1rem", textAlign:"center" }} className="fade-in">
      <div style={{ fontSize:"3rem", marginBottom:"1rem", display:"inline-block", animation:"spin 1.5s linear infinite" }}>🔍</div>
      <h3 style={{ fontFamily:"var(--font-display)", color:"var(--text)", marginBottom:"0.5rem" }}>Marking your answer…</h3>
      <p style={{ color:"var(--text-muted)" }}>The AI examiner is reading your response carefully.</p>
    </div>
  );

  // ── Step: result
  if (step === "result" && result) return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <div style={S.card}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"1.25rem", flexWrap:"wrap", gap:"0.5rem" }}>
          <div>
            <h2 style={{ margin:0, fontFamily:"var(--font-display)", fontSize:"1.3rem" }}>Your Result</h2>
            <p style={{ margin:"0.2rem 0 0", color:"var(--text-muted)", fontSize:"0.8rem" }}>Marked by {result.model} · {q?.label} · {paper?.label || "Practice"}</p>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontFamily:"var(--font-display)", fontSize:"2.6rem", color: markColour(result.mark, result.outOf), lineHeight:1 }}>
              {result.mark}<span style={{ fontSize:"1.2rem", color:"var(--text-muted)" }}>/{result.outOf}</span>
            </div>
            <div style={{ fontSize:"0.82rem", fontWeight:700, color: markColour(result.mark, result.outOf) }}>{result.grade}</div>
          </div>
        </div>

        <div style={{ background:"var(--bg)", borderRadius:10, padding:"1rem", marginBottom:"1.1rem", fontSize:"0.9rem", color:"var(--text-secondary)", lineHeight:1.65 }}>
          {result.summary}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.85rem", marginBottom:"1.1rem" }}>
          <div style={{ background:"#f0fdf4", borderRadius:10, padding:"1rem" }}>
            <div style={{ fontWeight:700, fontSize:"0.85rem", color:"#166534", marginBottom:"0.5rem" }}>✅ Strengths</div>
            {result.strengths?.map((s,i) => <div key={i} style={{ fontSize:"0.84rem", color:"#15803d", marginBottom:4, lineHeight:1.5 }}>• {s}</div>)}
          </div>
          <div style={{ background:"#fff7ed", borderRadius:10, padding:"1rem" }}>
            <div style={{ fontWeight:700, fontSize:"0.85rem", color:"#9a3412", marginBottom:"0.5rem" }}>📈 To improve</div>
            {result.improvements?.map((s,i) => <div key={i} style={{ fontSize:"0.84rem", color:"#c2410c", marginBottom:4, lineHeight:1.5 }}>• {s}</div>)}
          </div>
        </div>

        <div style={{ background:"#eff6ff", borderRadius:10, padding:"1rem", marginBottom:"1.25rem" }}>
          <div style={{ fontWeight:700, fontSize:"0.85rem", color:"#1d4ed8", marginBottom:"0.3rem" }}>💡 Examiner's tip</div>
          <div style={{ fontSize:"0.875rem", color:"#1e40af", lineHeight:1.6 }}>{result.examinerTip}</div>
        </div>

        <div style={{ display:"flex", gap:"0.75rem", justifyContent:"flex-end", flexWrap:"wrap" }}>
          <button onClick={()=>{ reset(); setStep("q"); }} style={S.secondaryBtn}>Try another question</button>
          <button onClick={()=>{ reset(); setStep("write"); }} style={{ ...S.primaryBtn, width:"auto" }}>Try this question again</button>
        </div>
      </div>
    </div>
  );

  return null;
}

// ── PROGRESS PAGE ──────────────────────────────────────────────────────────
function ProgressPage({ user }) {
  const subs = DB.getSubmissions(user.id);

  return (
    <div style={{ maxWidth:800, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <h2 style={S.pageH}>My Progress</h2>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:"0.75rem", marginBottom:"1.75rem" }}>
        {QUESTIONS.map(q => {
          const qs = subs.filter(s => s.qId === q.id);
          const avg = qs.length ? Math.round(qs.reduce((a,s) => a + (s.result?.mark||0)/(s.result?.outOf||1), 0) / qs.length * 100) : null;
          return (
            <div key={q.id} style={{ background:"var(--card)", borderRadius:12, padding:"1rem", boxShadow:"var(--shadow)", textAlign:"center", border:"1px solid var(--border)" }}>
              <div style={{ fontFamily:"var(--font-display)", fontSize:"1.6rem", color: avg!=null?markColour(avg,100):"var(--text-muted)", lineHeight:1 }}>{avg!=null?`${avg}%`:"—"}</div>
              <div style={{ fontSize:"0.83rem", fontWeight:700, color:"var(--text)", marginTop:3 }}>{q.label}</div>
              <div style={{ fontSize:"0.73rem", color:"var(--text-muted)", marginTop:2 }}>{qs.length} attempt{qs.length!==1?"s":""}</div>
            </div>
          );
        })}
      </div>

      {subs.length === 0 ? (
        <div style={{ textAlign:"center", padding:"3rem", color:"var(--text-muted)" }}>No submissions yet. Head to Practice & Marking to get started!</div>
      ) : (
        <div style={S.card}>
          <h3 style={{ margin:"0 0 1rem", fontFamily:"var(--font-display)", fontSize:"1.1rem" }}>All submissions</h3>
          {subs.map(s => <SubRow key={s.id} sub={s} expanded />)}
        </div>
      )}
    </div>
  );
}

// ── PAPERS PAGE ────────────────────────────────────────────────────────────
function PapersPage() {
  return (
    <div style={{ maxWidth:800, margin:"0 auto", padding:"2rem 1rem" }} className="fade-in">
      <h2 style={S.pageH}>Past Papers</h2>
      <p style={{ color:"var(--text-muted)", marginBottom:"1.5rem" }}>Official Edexcel papers, fetched directly from Pearson's servers. Links open in a new tab.</p>
      {PAST_PAPERS.map(p => {
        const ant = ANTHOLOGY_TEXTS.find(t => t.id === p.anthology);
        return (
          <div key={p.id} style={{ ...S.card, marginBottom:"0.85rem", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"1rem", padding:"1.1rem 1.5rem" }}>
            <div>
              <div style={{ fontWeight:700, fontFamily:"var(--font-display)", fontSize:"1rem" }}>{p.label}</div>
              <div style={{ fontSize:"0.8rem", color:"var(--text-muted)", marginTop:2 }}>Anthology: <span style={{ color:"var(--accent)" }}>{ant?.title}</span> · {ant?.author}</div>
            </div>
            <div style={{ display:"flex", gap:"0.5rem" }}>
              <a href={p.queUrl} target="_blank" rel="noreferrer"
                style={{ background:"var(--accent)", color:"#fff", padding:"0.45rem 0.9rem", borderRadius:8, fontSize:"0.8rem", textDecoration:"none", fontWeight:600 }}>Question paper ↗</a>
              <a href={p.srcUrl} target="_blank" rel="noreferrer"
                style={{ background:"var(--bg)", border:"1px solid var(--border)", color:"var(--text)", padding:"0.45rem 0.9rem", borderRadius:8, fontSize:"0.8rem", textDecoration:"none", fontWeight:600 }}>Source booklet ↗</a>
            </div>
          </div>
        );
      })}
      <div style={{ background:"#eff6ff", borderRadius:12, padding:"1rem 1.25rem", fontSize:"0.84rem", color:"#1e40af", marginTop:"0.5rem" }}>
        📎 More papers can be added by your teacher. All PDFs are hosted by Pearson Education Ltd.
      </div>
    </div>
  );
}

// ── SUBMISSION ROW ─────────────────────────────────────────────────────────
function SubRow({ sub, showStudent, expanded: initExpanded }) {
  const [open, setOpen] = useState(initExpanded ? false : false);
  const q = QUESTIONS.find(x => x.id === sub.qId);
  const p = PAST_PAPERS.find(x => x.id === sub.paperId);
  return (
    <div style={{ borderBottom:"1px solid var(--border)", padding:"0.8rem 0" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", flexWrap:"wrap", gap:"0.5rem" }} onClick={()=>setOpen(!open)}>
        <div style={{ display:"flex", gap:"0.6rem", alignItems:"center", flexWrap:"wrap" }}>
          <span style={{ fontWeight:700, fontSize:"0.875rem", color:"var(--text)" }}>{q?.label}</span>
          {showStudent && <span style={{ fontSize:"0.8rem", color:"var(--text-muted)" }}>{sub.userName}</span>}
          {p && <span style={{ fontSize:"0.78rem", color:"var(--text-muted)" }}>{p.label}</span>}
          <span style={{ fontSize:"0.73rem", color:"var(--text-muted)" }}>{new Date(sub.ts).toLocaleDateString()}</span>
          {sub.model && <span style={{ fontSize:"0.7rem", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:4, padding:"1px 5px", color:"var(--text-muted)" }}>{sub.model}</span>}
        </div>
        <div style={{ display:"flex", gap:"0.6rem", alignItems:"center" }}>
          <span style={{ fontWeight:700, fontFamily:"var(--font-display)", color: markColour(sub.result?.mark, sub.result?.outOf) }}>{sub.result?.mark}/{sub.result?.outOf}</span>
          <span style={{ color:"var(--text-muted)", fontSize:"0.75rem" }}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open && sub.result && (
        <div style={{ marginTop:"0.6rem", background:"var(--bg)", borderRadius:10, padding:"0.9rem", fontSize:"0.84rem", color:"var(--text-secondary)", lineHeight:1.55 }}>
          <div style={{ marginBottom:"0.4rem" }}><strong>Summary:</strong> {sub.result.summary}</div>
          <div style={{ marginBottom:"0.4rem" }}><strong>Strengths:</strong> {sub.result.strengths?.join(" · ")}</div>
          <div style={{ marginBottom:"0.4rem" }}><strong>To improve:</strong> {sub.result.improvements?.join(" · ")}</div>
          <div><strong>Tip:</strong> {sub.result.examinerTip}</div>
        </div>
      )}
    </div>
  );
}

// ── TEACHER DASHBOARD ──────────────────────────────────────────────────────
function TeacherDashboard({ user, onLogout }) {
  const [tab, setTab] = useState("overview");
  const allSubs  = DB.getSubmissions(null);
  const allFlags = DB.getFlags();
  const unresolved = allFlags.filter(f => !f.resolved);
  const claudeToday = DB.claudeToday();
  const [, forceUpdate] = useState(0);

  const navItems = [
    { id:"overview", icon:"📊", label:"Overview" },
    { id:"submissions", icon:"📝", label:"All Submissions" },
    { id:"safeguarding", icon:"🛡️", label:`Safeguarding${unresolved.length?` (${unresolved.length})`:""}` },
    { id:"settings", icon:"⚙️", label:"Settings" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <header style={{ background:"var(--card)", borderBottom:"1px solid var(--border)", padding:"0 1.5rem", display:"flex", alignItems:"center", justifyContent:"space-between", height:62, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:"1.05rem", color:"var(--accent)" }}>📚 English iGCSE · Teacher Dashboard</div>
        <div style={{ display:"flex", alignItems:"center", gap:"0.85rem" }}>
          {unresolved.length > 0 && (
            <button onClick={()=>setTab("safeguarding")} style={{ background:"#ef4444", color:"#fff", border:"none", borderRadius:20, padding:"0.25rem 0.75rem", fontSize:"0.8rem", fontWeight:700, cursor:"pointer" }}>
              ⚠️ {unresolved.length} flag{unresolved.length!==1?"s":""}
            </button>
          )}
          <span style={{ fontSize:"0.875rem", color:"var(--text-secondary)" }}>{user.name}</span>
          <button onClick={onLogout} style={S.secondaryBtn}>Sign out</button>
        </div>
      </header>

      <div style={{ display:"flex", flex:1 }}>
        {/* Sidebar */}
        <nav style={{ width:200, background:"var(--card)", borderRight:"1px solid var(--border)", padding:"1.25rem 0", flexShrink:0 }}>
          {navItems.map(item => (
            <button key={item.id} onClick={()=>setTab(item.id)}
              style={{ width:"100%", textAlign:"left", padding:"0.75rem 1.5rem", border:"none", background:tab===item.id?"var(--accent-light)":"transparent", color:tab===item.id?"var(--accent)":"var(--text-secondary)", cursor:"pointer", fontSize:"0.875rem", fontWeight:tab===item.id?700:400, fontFamily:"var(--font-body)", borderLeft:tab===item.id?"3px solid var(--accent)":"3px solid transparent" }}>
              {item.icon} {item.label}
            </button>
          ))}
        </nav>

        {/* Main */}
        <main style={{ flex:1, padding:"2rem", overflowY:"auto" }} className="fade-in">
          {tab === "overview" && (
            <div>
              <h2 style={S.pageH}>Overview</h2>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:"0.85rem", marginBottom:"1.75rem" }}>
                {[
                  { icon:"📝", label:"Total submissions",  value: allSubs.length },
                  { icon:"🛡️", label:"Safeguarding flags", value: allFlags.length, hi: unresolved.length>0 },
                  { icon:"🤖", label:"Claude calls today",  value: `${claudeToday}/${CONFIG.CLAUDE_DAILY_CAP}` },
                  { icon:"👥", label:"Students active",     value: [...new Set(allSubs.map(s=>s.userId))].length },
                ].map(({ icon, label, value, hi }) => (
                  <div key={label} style={{ background: hi?"#fff1f2":"var(--card)", borderRadius:14, padding:"1.1rem 1.25rem", border:`1px solid ${hi?"#fecdd3":"var(--border)"}`, boxShadow:"var(--shadow)" }}>
                    <div style={{ fontSize:"1.4rem", marginBottom:"0.4rem" }}>{icon}</div>
                    <div style={{ fontFamily:"var(--font-display)", fontSize:"1.8rem", color: hi?"#be123c":"var(--accent)", lineHeight:1 }}>{value}</div>
                    <div style={{ fontSize:"0.8rem", color:"var(--text-muted)", marginTop:3 }}>{label}</div>
                  </div>
                ))}
              </div>
              <div style={S.card}>
                <h3 style={{ margin:"0 0 1rem", fontFamily:"var(--font-display)", fontSize:"1.1rem" }}>Recent activity</h3>
                {allSubs.length === 0 ? <p style={{ color:"var(--text-muted)" }}>No submissions yet.</p>
                  : allSubs.slice(0,10).map(s => <SubRow key={s.id} sub={s} showStudent />)}
              </div>
            </div>
          )}

          {tab === "submissions" && (
            <div>
              <h2 style={S.pageH}>All Submissions</h2>
              <div style={S.card}>
                {allSubs.length === 0 ? <p style={{ color:"var(--text-muted)" }}>No submissions yet.</p>
                  : allSubs.map(s => <SubRow key={s.id} sub={s} showStudent expanded />)}
              </div>
            </div>
          )}

          {tab === "safeguarding" && (
            <div>
              <h2 style={S.pageH}>Safeguarding Flags</h2>
              <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:12, padding:"1rem 1.25rem", marginBottom:"1.5rem", fontSize:"0.875rem", color:"#9a3412", lineHeight:1.6 }}>
                🛡️ <strong>For authorised staff only.</strong> All flags are generated automatically when keywords are detected or the AI raises a concern. Review promptly in line with your school's safeguarding policy (KCSIE 2024). Unresolved flags should be referred to your Designated Safeguarding Lead (DSL) without delay. Do not contact the student directly about flagged content without consulting your DSL first.
              </div>
              {allFlags.length === 0 ? (
                <div style={{ textAlign:"center", padding:"3rem", color:"var(--text-muted)" }}>No flags raised. 🎉</div>
              ) : allFlags.map(flag => (
                <div key={flag.id} style={{ background: flag.resolved?"var(--card)":"#fff1f2", border:`1px solid ${flag.resolved?"var(--border)":"#fecdd3"}`, borderRadius:12, padding:"1.1rem 1.25rem", marginBottom:"0.75rem" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:"0.5rem" }}>
                    <div>
                      <span style={{ fontWeight:700, color: flag.resolved?"var(--text-muted)":"#be123c" }}>{flag.resolved ? "✓ Resolved" : "⚠️ Unresolved"}</span>
                      <span style={{ marginLeft:"0.75rem", fontSize:"0.875rem", color:"var(--text)" }}>{flag.userName}</span>
                      <span style={{ marginLeft:"0.5rem", fontSize:"0.8rem", color:"var(--text-muted)" }}>{new Date(flag.ts).toLocaleString()}</span>
                    </div>
                    {!flag.resolved && (
                      <button onClick={()=>{ DB.resolveFlag(flag.id); forceUpdate(n=>n+1); }}
                        style={{ ...S.secondaryBtn, fontSize:"0.78rem", padding:"0.3rem 0.7rem" }}>Mark resolved</button>
                    )}
                  </div>
                  <div style={{ marginTop:"0.4rem", fontSize:"0.78rem", color:"var(--text-muted)" }}>
                    Reason: {flag.reason} · {QUESTIONS.find(q=>q.id===flag.qId)?.label || flag.qId}
                  </div>
                  <div style={{ marginTop:"0.5rem", background:"var(--bg)", borderRadius:8, padding:"0.7rem 0.9rem", fontSize:"0.84rem", color:"var(--text-secondary)", lineHeight:1.55 }}>
                    {flag.content?.slice(0,300)}{flag.content?.length>300?"…":""}
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === "settings" && (
            <div>
              <h2 style={S.pageH}>Settings & API</h2>
              <div style={{ ...S.card, maxWidth:580 }}>
                <p style={{ color:"var(--text-secondary)", marginTop:0, lineHeight:1.65, marginBottom:"1.25rem" }}>
                  API keys are stored as <strong>Vercel Environment Variables</strong> — they never touch the browser. To update them, go to your Vercel project → <strong>Settings → Environment Variables</strong>, then redeploy.
                </p>
                <div style={{ display:"flex", flexDirection:"column", gap:"0.75rem", marginBottom:"1.5rem" }}>
                  {[
                    { label:"Anthropic (Claude)", env:"ANTHROPIC_KEY", desc:"Primary marker — uses Claude Sonnet" },
                    { label:"Google (Gemini 2.0 Flash)", env:"GEMINI_KEY", desc:"Free-tier fallback — 1,500 req/day" },
                  ].map(({ label, env, desc }) => (
                    <div key={env} style={{ padding:"0.85rem 1rem", background:"var(--bg)", borderRadius:8 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ fontWeight:600, fontSize:"0.875rem" }}>{label}</div>
                        <span style={{ fontSize:"0.73rem", fontFamily:"monospace", background:"var(--card)", border:"1px solid var(--border)", borderRadius:4, padding:"0.15rem 0.5rem", color:"var(--text-muted)" }}>{env}</span>
                      </div>
                      <div style={{ fontSize:"0.78rem", color:"var(--text-muted)", marginTop:3 }}>{desc}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background:"var(--bg)", borderRadius:10, padding:"1rem", fontSize:"0.84rem", color:"var(--text-muted)", lineHeight:1.65 }}>
                  <strong>Claude daily cap:</strong> {CONFIG.CLAUDE_DAILY_CAP} calls/day (today: {claudeToday} used).<br/>
                  After the cap, marking switches automatically to Gemini. To change the cap, edit <code>CLAUDE_DAILY_CAP</code> in <code>public/index.html</code> and redeploy.
                </div>
              </div>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

// ── STUDENT SHELL ──────────────────────────────────────────────────────────
function StudentShell({ user, onLogout }) {
  const [page, setPage] = useState("home");
  const navItems = [
    { id:"home",     icon:"🏠", label:"Home" },
    { id:"revision", icon:"📖", label:"Revision" },
    { id:"practice", icon:"✏️", label:"Practice" },
    { id:"progress", icon:"📊", label:"Progress" },
    { id:"papers",   icon:"📄", label:"Papers" },
  ];
  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      <header style={{ background:"var(--card)", borderBottom:"1px solid var(--border)", padding:"0 1.25rem", display:"flex", alignItems:"center", justifyContent:"space-between", height:58, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:"1rem", color:"var(--accent)" }}>📚 English iGCSE</div>
        <nav style={{ display:"flex", gap:"0.15rem" }}>
          {navItems.map(item => (
            <button key={item.id} onClick={()=>setPage(item.id)}
              style={{ background: page===item.id?"var(--accent-light)":"transparent", color: page===item.id?"var(--accent)":"var(--text-secondary)", border:"none", padding:"0.45rem 0.7rem", borderRadius:8, cursor:"pointer", fontSize:"0.82rem", fontWeight: page===item.id?700:400, fontFamily:"var(--font-body)" }}>
              <span>{item.icon}</span>
              <span className="nav-label" style={{ marginLeft:"0.3rem" }}>{item.label}</span>
            </button>
          ))}
        </nav>
        <button onClick={onLogout} style={{ ...S.secondaryBtn, fontSize:"0.78rem", padding:"0.38rem 0.75rem" }}>Sign out</button>
      </header>
      <div>
        {page==="home"     && <StudentHome     user={user} nav={setPage} />}
        {page==="revision" && <RevisionPage />}
        {page==="practice" && <PracticePage    user={user} />}
        {page==="progress" && <ProgressPage    user={user} />}
        {page==="papers"   && <PapersPage />}
      </div>
    </div>
  );
}

// ── ROOT ───────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => DB.get("dc_user"));

  const login = u => { DB.set("dc_user", u); setUser(u); };
  const logout = () => { DB.set("dc_user", null); setUser(null); };

  if (!user)               return <LoginPage onLogin={login} />;
  if (user.role==="teacher") return <TeacherDashboard user={user} onLogout={logout} />;
  return <StudentShell user={user} onLogout={logout} />;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
